<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดีกันนะคนเก่ง 🥺</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- เพิ่มแท็กเครื่องเล่นเสียง MP3 (ให้นำไฟล์เพลงใส่ไว้ในโฟลเดอร์ audio/ แล้วตั้งชื่อว่า music.mp3) -->
    <audio id="bg-music" src="audio/1.mp3" loop></audio>

    <!-- หน้าโหลด 5 วินาที -->
    <div id="preloader">
        <div class="running-heart-container">
            <div class="running-heart">💖</div>
            <div class="heart-shadow"></div>
        </div>
        <div class="loader-text">กำลังโหลดความรัก...</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <div class="noise"></div>
    <div class="tech-grid"></div>
    <div class="aurora-bg">
        <div class="orb orb-1">❤</div>
        <div class="orb orb-2">❤</div>
        <div class="orb orb-3">❤</div>
    </div>

    <!-- Wrapper หลักคุมกึ่งกลางหน้าจอ -->
    <div class="page-center-wrapper">
        <!-- การ์ดหลัก (หน้าแรก) -->
        <div class="glass-card" id="card">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <div class="header-text" id="header-text">
                <div class="tech-badge">STATUS: ANGRY_GF <span class="blink">●</span></div>
                <h1>ขอโทษนะค้าบบคนดี</h1>
                <p>ให้อภัยเค้านะคะคนเก่ง</p>
            </div>

            <div class="action-zone" id="action-zone">
                <button class="main-btn glow-btn" id="btn-yes">ให้อภัยเค้านะค้าบบ</button>
                <button class="main-btn outline-btn" id="btn-no">ไม่ให้อภัย!</button>
            </div>
        </div>

        <!-- ซองจดหมายและหัวใจพุ่งโค้งสูง -->
        <div class="envelope-container" id="env-container">
            <div class="envelope" id="envelope">
                <div class="flap-top"></div>
                <div class="flap-front"></div>
            </div>
            
            <div class="floating-options" id="floating-options">
                <button class="heart-btn hb-1" onclick="openCard(1)">
                    <span>ง้อนะ<br>ค้าบ</span>
                </button>
                <button class="heart-btn hb-2" onclick="openCard(2)">
                    <span>ดีกันได้<br>ไหมค้าบ</span>
                </button>
                <button class="heart-btn hb-3" onclick="openCard(3)">
                    <span>เค้ารัก<br>หนูนะ</span>
                </button>
            </div>
        </div>
    </div>

    <!-- หน้าต่างเปิดการ์ดรูปภาพ -->
    <div class="photo-card-overlay" id="photo-card-overlay">
        <div class="photo-card glass-card">
            <div class="photo-frame">
                <img id="card-image" src="" alt="รูปง้อแฟน">
            </div>

            <div class="typewriter-box">
                <p id="typewriter-text"></p>
            </div>

            <div class="card-action-zone">
                <button class="card-btn back-btn" onclick="closePhotoCard()">↩ กลับไปดูหัวใจอีกดวง</button>
                <button class="card-btn forgive-btn" onclick="showFinalSuccess()">หายงอนแล้ว 💖</button>
            </div>
        </div>
    </div>

    <!-- ไวรัสคลั่งรัก -->
    <div id="spam-overlay">
        <div class="spam-msg glass-card initial-spam" id="initial-spam">
            <button class="close-x" id="trigger-spam-btn">✖</button>
            <div class="spam-content">
                <h2>ยังงอนเค้าหรอค้าบ... 🥺</h2>
                <p>กดปิดสิ ถ้าคิดว่าหนีเค้าพ้น!</p>
            </div>
        </div>
    </div>

    <!-- หน้าจอยินดีตอนจบ -->
    <div class="overlay" id="overlay">
        <div id="confetti-container"></div> 
        <div class="success-card glass-card">
            <div class="photo-frame" style="height: 220px; margin-bottom: 15px;">
                <img id="final-card-image" src="" alt="รูปความทรงจำ">
            </div>
            <div class="tech-badge" style="margin: 0 auto 10px auto; color: #ff2a55; background: rgba(255, 42, 85, 0.15); border-color: rgba(255, 42, 85, 0.3);">ACCESS: GRANTED</div>
            <h1 style="font-size: 24px; color: #333; margin-bottom: 5px;">เย้! ดีกันแล้วนะ 💖</h1>
            <p id="final-result-text" style="font-size: 15px; color: #ff2a55; margin-bottom: 15px; font-weight: 500;"></p>
            <p class="hint-text">/* อ้วนรักหนูมากๆๆๆๆ */</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
